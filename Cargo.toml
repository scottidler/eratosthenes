[package]
name = "eratosthenes"
version = "0.1.1"
edition = "2024"
authors = ["Your Name <your.email@example.com>"]
build = "build.rs"
description = "A CLI application generated by rust-scaffold"

[dependencies]
chrono = "0.4.44"
clap = { version = "4.6.0", features = ["derive"] }
colored = "3.1.1"
dirs = "6.0.0"
env_logger = "0.11.10"
eyre = "0.6.12"
globset = "0.4.18"
google-gmail1 = "7.0.0"
hyper-rustls = "0.27.7"
hyper-util = "0.1.20"
log = "0.4.29"
rustls = "0.23.37"
serde = { version = "1.0.228", features = ["derive"] }
serde_yaml = "0.9.34"
tokio = { version = "1.50.0", features = ["full"] }
yup-oauth2 = "12.1.2"
# Dependencies will be added via cargo add

[build-dependencies]
# For build.rs if needed
